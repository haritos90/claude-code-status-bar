# Publish a GitHub Release for each pushed version tag (v*). The release notes are
# the annotated tag's own message (write it with `git tag -a vX.Y -m "notes"`)
# followed by an auto-generated changelog: commit subjects since the previous v*
# tag, or the whole history on the first release. No assets are attached — the
# status line updates itself by fetching statusline.sh from raw at the tag. Also
# runnable against an existing tag via workflow_dispatch.
name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build release notes for"
        required: true

permissions:
  contents: write # create/edit the GitHub Release

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history + tags, so the changelog can be computed)
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      # Notes = the annotated tag message (or a one-line default for a lightweight
      # tag) + a changelog of commit subjects since the previous v* tag. `$TAG^`
      # starts the previous-tag search at the tagged commit's parent so the current
      # tag is never matched; the whole history is used when there is no previous tag.
      - name: Build release notes
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          if [ "$(git cat-file -t "$TAG" 2>/dev/null)" = "tag" ]; then
            git tag -l --format='%(contents)' "$TAG" > notes.md
          else
            echo "Release $TAG." > notes.md
          fi
          PREV=$(git describe --tags --abbrev=0 --match 'v*' "$TAG^" 2>/dev/null || true)
          {
            echo
            echo "---"
            if [ -n "$PREV" ]; then
              echo "**Changes since $PREV**"
              echo
              git log --no-merges --pretty=format:'- %s (%h)' "$PREV..$TAG"
            else
              echo "**Changes**"
              echo
              git log --no-merges --pretty=format:'- %s (%h)' "$TAG"
            fi
            echo
          } >> notes.md

      - name: Create or update the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          gh release create "$TAG" --title "$TAG" --notes-file notes.md \
            || gh release edit "$TAG" --notes-file notes.md
